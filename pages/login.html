<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - PDA仓储管理系统</title>
    <link rel="stylesheet" href="../styles/pda-common.css">
    <link rel="stylesheet" href="../styles/pda-login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">📦</div>
            <h1>PDA仓储管理系统</h1>
            <p>智能仓储管理平台</p>
        </div>

        <div class="login-form-wrapper">
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label>手机号码</label>
                    <input 
                        type="tel" 
                        id="username" 
                        name="username" 
                        placeholder="请输入手机号码" 
                        autocomplete="off"
                        maxlength="11"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="请输入密码" 
                        required
                    >
                </div>

                <div class="form-options">
                    <label class="remember-checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>记住手机号</span>
                    </label>
                </div>

                <button type="submit" class="login-btn">登录</button>
            </form>
        </div>

        <div class="login-footer">
            <p>© 2024 大同WMS</p>
        </div>
    </div>

    <script src="../scripts/pda-login.js"></script>
</body>
</html>
