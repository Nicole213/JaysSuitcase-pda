<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>待包装成品入库 - PDA</title>
    <link rel="stylesheet" href="../styles/pda-common.css">
    <link rel="stylesheet" href="../styles/pda-awaiting-pack-inbound.css">
</head>
<body>
    <div class="pda-container">
        <div class="pda-header">
            <button class="back-btn" onclick="window.location.href='../index.html'">← 返回</button>
            <h1>待包装成品入库</h1>
        </div>

        <div class="scan-card">
            <div class="card-title">
                <span>扫描地标码</span>
                <button class="icon-btn" id="clearGroundBtn">🗑️</button>
            </div>
            <div class="scan-input-group">
                <input type="text" class="scan-input" id="groundCodeInput" placeholder="请扫描地标码，如 DB-A01-01" autocomplete="off" autofocus>
            </div>
        </div>

        <div class="action-bar">
            <button class="primary-btn awaiting-pack-primary" id="confirmInboundBtn">提交</button>
        </div>

        <div class="info-card" id="successCard" style="display: none;">
            <div class="card-title">本次入库结果</div>
            <div class="success-panel">
                <div class="success-mark">✓</div>
                <div class="success-copy">
                    <div class="success-title">入库成功</div>
                    <div class="success-detail" id="successDetailText">待包装成品已成功入库至指定地标码</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/pda-awaiting-pack-inbound.js"></script>
</body>
</html>
