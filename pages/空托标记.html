<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空托标记 - PDA</title>
    <link rel="stylesheet" href="../styles/pda-common.css">
    <link rel="stylesheet" href="../styles/pda-empty-pallet.css">
</head>
<body>
    <div class="pda-container">
        <div class="pda-header">
            <button class="back-btn" onclick="window.location.href='../index.html'">← 返回</button>
            <h1>空托标记</h1>
        </div>

        <div class="scan-card">
            <div class="card-title">扫描托盘码</div>
            <div class="scan-input-group">
                <input type="text" class="scan-input" id="emptyPalletCodeInput" placeholder="请扫描托盘码" autocomplete="off" autofocus>
            </div>
            <div class="help-text scan-demo-hint" id="demoEmptyPalletHint">可试用托盘码：-</div>
        </div>

        <div class="action-bar">
            <button class="primary-btn" id="confirmEmptyPalletBtn">确认空托</button>
        </div>
    </div>

    <div class="modal" id="confirmEmptyPalletModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>确认空托</h3>
            </div>
            <div class="modal-body">
                <div class="info-row">
                    <label>托盘码：</label>
                    <span id="confirmEmptyPalletCode">-</span>
                </div>
                <div class="empty-pallet-confirm-copy">确认将该托盘标记为空托吗？</div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn primary" id="confirmEmptyPalletSubmitBtn">确认</button>
                <button class="modal-btn secondary" id="cancelEmptyPalletSubmitBtn">取消</button>
            </div>
        </div>
    </div>

    <script src="../scripts/pda-empty-pallet.js"></script>
</body>
</html>
